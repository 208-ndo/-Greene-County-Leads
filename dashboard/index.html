<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowX Lead Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .grade-a { color: #4ade80; font-weight: bold; }
        .grade-b { color: #fbbf24; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">FlowX Institutional Leads</h1>
            <div id="stats" class="text-right text-gray-400 text-sm">Loading stats...</div>
        </div>

        <div class="card rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-gray-300 uppercase text-xs">
                    <tr>
                        <th class="p-4">Score</th>
                        <th class="p-4">Owner</th>
                        <th class="p-4">Mailing Address</th>
                        <th class="p-4">Property Address</th>
                        <th class="p-4">Lead Type</th>
                        <th class="p-4">Amount</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="leadTable" class="divide-y divide-slate-700">
                    <!-- Leads will be injected here by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadLeads() {
            try {
                const response = await fetch('records.json');
                const data = await response.json();
                const leads = data.records;
                
                document.getElementById('stats').innerText = `Total Leads: ${data.total} | With Addresses: ${data.with_address} | Last Updated: ${data.fetched_at}`;
                
                const table = document.getElementById('leadTable');
                leads.sort((a, b) => b.score - a.score).forEach(lead => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-700 transition-colors";
                    row.innerHTML = `
                        <td class="p-4 font-bold ${lead.score > 70 ? 'text-green-400' : 'text-white'}">${lead.score}</td>
                        <td class="p-4">${lead.owner}</td>
                        <td class="p-4 text-sm text-gray-300">${lead.mail_address}, ${lead.mail_city}, ${lead.mail_state} ${lead.mail_zip}</td>
                        <td class="p-4 text-sm text-gray-300">${lead.prop_address}, ${lead.prop_city}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-xs bg-blue-900 text-blue-200">${lead.cat_label}</span></td>
                        <td class="p-4 text-gray-300">${lead.amount}</td>
                        <td class="p-4"><a href="${lead.clerk_url}" target="_blank" class="text-blue-400 hover:underline text-xs">View Record</a></td>
                    `;
                    table.appendChild(row);
                });
            } catch (e) {
                console.error("Error loading leads:", e);
            }
        }
        loadLeads();
    </script>
</body>
</html>
