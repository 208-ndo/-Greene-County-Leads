name: FlowX Daily Scrape
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml dbfread playwright pandas
          python -m playwright install --with-deps chromium

      - name: Run Scraper
        run: python scraper/fetch.py

      - name: Commit and Push
        run: |
          git config --global user.name "FlowX-Bot"
          git config --global user.email "bot@flowx.ai"
          git add dashboard/records.json data/records.json ghl_export.csv
          git commit -m "Daily lead update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
